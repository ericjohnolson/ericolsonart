<script type="text/javascript">
    //<![CDATA[
    $(document).ready(function () {
        var scrolldiv1 = $(".sidescroll p"); //the div you want
        var height = $(".home .banner").height() * 0.75; //calculate height of window or whatever element you want it to scroll past

        $(window).scroll(function () {
            if ($(this).scrollTop() > height) {
                $(scrolldiv1).css('color', '#5cd64a');
                $(scrolldiv1).css('border-color', '#5cd64a');
            }

            else {
                $(scrolldiv1).css('color', '#ffffff');
                $(scrolldiv1).css('border-color', '#ffffff');

            }

        });
    });
    //]]>
</script>
